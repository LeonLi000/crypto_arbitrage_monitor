app:
  name: "Crypto Arbitrage Monitor"
  version: "1.0.0"
  debug: true

monitoring:
  update_interval: 1
  min_profit_threshold: 0.5
  max_slippage: 0.3

risk:
  max_position_size: 10000
  max_daily_trades: 50
  stop_loss: 2.0

database:
  url: "sqlite:///:memory:"
  pool_size: 1

notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
